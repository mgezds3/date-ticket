<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Date Express</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>


<style>

*{
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}


body{

margin:0;

min-height:100vh;

background:linear-gradient(135deg,#fff7e6,#dceeff);

display:flex;

justify-content:center;

align-items:center;

padding:20px;

overflow:auto;

}



.card{

width:100%;

max-width:430px;

background:white;

padding:35px;

border-radius:35px;

text-align:center;

box-shadow:0 20px 50px #0003;

}



h1{

font-size:30px;

font-weight:800;

}



h2{

font-weight:800;

}



button{

border:none;

border-radius:999px;

padding:14px 35px;

font-size:17px;

font-weight:700;

margin:10px;

cursor:pointer;

transition:.3s;

}



button:hover{

transform:scale(1.08);

}



#yes{

background:#4caf50;

color:white;

}



#no{

background:#e74c3c;

color:white;

position:absolute;

}



.hidden{

display:none;

}



input,textarea{

width:100%;

padding:14px;

margin:8px 0;

border-radius:18px;

border:2px solid #ddd;

font-size:16px;

}



textarea{

height:100px;

}



.menu{

display:flex;

flex-wrap:wrap;

justify-content:center;

gap:12px;

}



.menu button{

width:100px;

min-height:55px;

padding:10px 8px;

font-size:15px;

line-height:1.4;

background:white;

border:2px solid #eee;

border-radius:22px;

white-space:normal;

}




.menu button.selected{

transform:scale(1.08);

background:#8d6e63;

color:white;

border:3px solid #5d4037;

box-shadow:0 10px 25px #0003;

}



.ticket{

background:#f4dfad;

padding:30px;

border-left:12px dotted white;

border-right:12px dotted white;

}


.ticket p{

border-bottom:1px dashed #795548;

padding:8px;

font-size:15px;

}



/* افکت ذرات داخل صفحه سفارش */

.particle{

position:fixed;

font-size:20px;

opacity:.7;

animation:float 8s linear infinite;

pointer-events:none;

z-index:0;

}



@keyframes float{

0%{

transform:translateY(100vh) rotate(0deg);

opacity:0;

}


20%{

opacity:.8;

}


100%{

transform:translateY(-20vh) rotate(360deg);

opacity:0;

}

}


</style>

</head>


<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>


<body>


<div class="card" id="question">


<h1>
یه دیتمون نشه؟
</h1>


<button id="yes">
بله ❤️
</button>


<button id="no">
نه
</button>


</div>








<div class="card hidden" id="hoora">


<h2>
هورااااااااااااااا 🎉
</h2>


<p>
چیزه یعنی بریم برنامه‌ریزی کنیم 
</p>


<button onclick="nextForm()">
ادامه
</button>


</div>








<div class="card hidden" id="form">


<h2>
سفارشات دیت
</h2>


<input id="name" placeholder="اسم و فامیل">



<p>
تاریخ
</p>


<input id="date" type="date">



<p>
ساعت
</p>


<input id="time" type="time">






<h3>
غذا 🍽️
</h3>



<div class="menu">


<button class="food" onclick="selectFood(this,'پیتزا 🍕')">
🍕 پیتزا
</button>


<button class="food" onclick="selectFood(this,'برگر 🍔')">
🍔 برگر
</button>


<button class="food" onclick="selectFood(this,'پاستا 🍝')">
🍝 پاستا
</button>


<button class="food" onclick="selectFood(this,'سوشی 🍣')">
🍣 سوشی
</button>


</div>







<h3>
نوشیدنی ☕
</h3>



<div class="menu">


<button class="drink" onclick="selectDrink(this,'قهوه ☕')">
☕ قهوه
</button>


<button class="drink" onclick="selectDrink(this,'موهیتو 🍹')">
🍹 موهیتو
</button>


<button class="drink" onclick="selectDrink(this,'شیک 🥤')">
🥤 شیک
</button>


<button class="drink" onclick="selectDrink(this,'آبمیوه 🧃')">
🧃 آبمیوه
</button>


</div>





<input id="flower" placeholder="گل مورد علاقه 🌹">


<input id="place" placeholder="مکان مورد علاقه">


<textarea id="like" placeholder="چیزهایی که دوست داره"></textarea>



<button onclick="sendData()">
ساخت بلیت
</button>



</div>





<div class="card hidden ticket" id="success">


<h2>
🚂 DATE EXPRESS
</h2>


<p>
مسافر:
<span id="tname"></span>
</p>


<p>
تاریخ:
<span id="tdate"></span>
</p>


<p>
ساعت:
<span id="ttime"></span>
</p>


<p>
غذا:
<span id="tfood"></span>
</p>


<p>
نوشیدنی:
<span id="tdrink"></span>
</p>


<p>
گل:
<span id="tflower"></span>
</p>


<p>
مکان:
<span id="tplace"></span>
</p>


<p>
یادداشت:
<span id="tlike"></span>
</p>


<p>
شماره بلیت:
<span id="tnumber"></span>
</p>
<div id="qrcode"></div>


<p>
لطفا بلیط خود را هنگام ورود نشان داده و در نگه داری از آن کوشا باشید
</p>

</div>


<script>


const scriptURL =
"https://script.google.com/macros/s/AKfycbxG5W55KApHkeQf5ZY837rJjBF7efIktD2ejza8xdmkoXtEsiHjR_7YlxHEEgYa11whSA/exec";


let food="";
let drink="";




// رفتن به صفحه سفارش

function nextForm(){

document.getElementById("hoora").classList.add("hidden");

document.getElementById("form").classList.remove("hidden");


createParticles();

}






// انتخاب غذا

function selectFood(el,value){


document.querySelectorAll(".food")
.forEach(x=>x.classList.remove("selected"));


el.classList.add("selected");


food=value;


}





// انتخاب نوشیدنی

function selectDrink(el,value){


document.querySelectorAll(".drink")
.forEach(x=>x.classList.remove("selected"));


el.classList.add("selected");


drink=value;


}







// بله

document.getElementById("yes").onclick=function(){


document.getElementById("question")
.classList.add("hidden");


document.getElementById("hoora")
.classList.remove("hidden");


fireworks();


};







// فشفشه

function fireworks(){


/* انفجار اول مثل قبل */

let end=Date.now()+3000;


(function frame(){


confetti({

particleCount:20,

spread:100,

origin:{
x:0.5,
y:0.3
}

});



if(Date.now()<end){

requestAnimationFrame(frame);

}


})();




/* بارش فشفشه از بالا */


setInterval(()=>{


confetti({

particleCount:15,

spread:70,

startVelocity:20,

origin:{
x:Math.random(),
y:0
}


});


},700);



}



// ذرات متحرک صفحه سفارش

function createParticles(){


let icons=["✨","🌸","💫"];


setInterval(()=>{


let p=document.createElement("div");


p.className="particle";


p.innerHTML=
icons[Math.floor(Math.random()*icons.length)];



p.style.left=Math.random()*100+"vw";

p.style.animationDuration=
(5+Math.random()*5)+"s";



document.body.appendChild(p);



setTimeout(()=>{

p.remove();

},10000);



},700);



}







// دکمه نه فرار کنه

const no=document.getElementById("no");


document.addEventListener("mousemove",(e)=>{


let r=no.getBoundingClientRect();


let d=Math.hypot(

e.clientX-(r.left+r.width/2),

e.clientY-(r.top+r.height/2)

);



if(d<100){


no.style.left=Math.random()*80+"vw";

no.style.top=Math.random()*80+"vh";


}


});









// ساخت بلیت

function sendData(){


let ticket="DATE-"+Date.now();



let data={


name:document.getElementById("name").value,

date:document.getElementById("date").value,

time:document.getElementById("time").value,

food:food,

drink:drink,

flower:document.getElementById("flower").value,

place:document.getElementById("place").value,

like:document.getElementById("like").value,

ticket:ticket


};





tname.innerHTML=data.name;

tdate.innerHTML=data.date;

ttime.innerHTML=data.time;

tfood.innerHTML=data.food;

tdrink.innerHTML=data.drink;

tflower.innerHTML=data.flower;

tplace.innerHTML=data.place;

tlike.innerHTML=data.like;

tnumber.innerHTML=ticket;

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),{
text:ticket,
width:60,
height:60
});



fetch(scriptURL,{

method:"POST",

body:JSON.stringify(data)

})

.then(()=>{


document.getElementById("form")
.classList.add("hidden");


document.getElementById("success")
.classList.remove("hidden");


});


}



</script>


</body>

</html>
